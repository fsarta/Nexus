# Nexus — Docker Compose Development Environment
# Run: docker compose -f infrastructure/docker-compose.yml up -d

services:
  # ── CockroachDB (SQL) ──────────────────────
  cockroachdb:
    image: cockroachdb/cockroach:v23.2.12
    command: start-single-node --insecure --store=attrs=ssd,path=/cockroach/cockroach-data
    ports:
      - "26257:26257" # SQL
      - "8085:8080" # Admin UI
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health?ready=1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexus-network

  # ── Redis (Cache + Sessions) ───────────────
  redis:
    image: redis:7.4-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus-network

  # ── Neo4j (Graph DB) ──────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474" # Browser
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/nexus-dev-password
      - NEO4J_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: [ "CMD", "neo4j", "status" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexus-network

  # ── Elasticsearch (Search) ─────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nexus-network

  # ── MongoDB (Media Metadata) ───────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=nexus
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # ── Backend Services ───────────────────────

  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://root@cockroachdb:26257/nexus?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-change-in-production
      - GIN_MODE=debug
    depends_on:
      cockroachdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-network

  feed-service:
    build:
      context: ../services/feed-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgresql://root@cockroachdb:26257/nexus?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-change-in-production
      - GIN_MODE=debug
    depends_on:
      cockroachdb:
        condition: service_healthy
    networks:
      - nexus-network

  messaging-service:
    build:
      context: ../services/messaging-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgresql://root@cockroachdb:26257/nexus?sslmode=disable
      - JWT_SECRET=dev-secret-change-in-production
      - GIN_MODE=debug
    depends_on:
      cockroachdb:
        condition: service_healthy
    networks:
      - nexus-network

volumes:
  cockroach-data:
  redis-data:
  neo4j-data:
  elastic-data:
  mongo-data:


networks:
  nexus-network:
    driver: bridge
