name: Nexus CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  GO_VERSION: '1.23'

jobs:
  # ── Frontend ───────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── User Service ───────────────────────────
  user-service:
    name: User Service (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/user-service/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  # ── Feed Service ───────────────────────────
  feed-service:
    name: Feed Service (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/feed-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/feed-service/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  # ── Messaging Service ──────────────────────
  messaging-service:
    name: Messaging Service (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/messaging-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/messaging-service/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o /dev/null ./cmd/server

  # ── Docker Build Validation ────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [user-service, feed-service, messaging-service]

    steps:
      - uses: actions/checkout@v4

      - name: Build User Service image
        run: docker build -t nexus/user-service:ci services/user-service

      - name: Build Feed Service image
        run: docker build -t nexus/feed-service:ci services/feed-service

      - name: Build Messaging Service image
        run: docker build -t nexus/messaging-service:ci services/messaging-service

      - name: Verify images exist
        run: |
          docker images | grep nexus
